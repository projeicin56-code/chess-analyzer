[build]
  command = ""
  publish = "."

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    "Cross-Origin-Opener-Policy" = "same-origin"
    # COEP'i kapattık çünkü Worker sorun çıkarıyor
    # "Cross-Origin-Embedder-Policy" = "require-corp"